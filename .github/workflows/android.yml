name: Build Custom ntfy (FCM Enabled)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 官方文档要求：放入 Firebase 配置文件
      - name: Inject Google Services JSON
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          echo "Successfully created google-services.json"

      # 修改包名，避免与官方包名冲突导致无法收到 FCM
      - name: Modify Application ID
        run: |
          sed -i "s/applicationId \"io.heckel.ntfy\"/applicationId \"${{ secrets.MY_FORK_APPLICATION_ID }}\"/g" app/build.gradle
          echo "Application ID updated to ${{ secrets.MY_FORK_APPLICATION_ID }}"
          
      # 官方文档建议：修改 values.xml 中的默认服务器地址
      - name: Modify Default Base URL
        run: |
          # 使用 | 作为分隔符，替换默认的 https://ntfy.sh 为你的私有域名
          sed -i "s|https://ntfy.sh|${{ secrets.APP_BASE_URL }}|g" app/src/main/res/values/values.xml
          echo "Default Base URL updated to ${{ secrets.APP_BASE_URL }}"

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

# 1. 把刚才存在 GitHub 的那一长串文本，重新变回 my-release-key.jks 文件
      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $ENCODED_STRING | base64 -di > app/my-release-key.jks

      # 2. 调用打包命令，同时把 GitHub 里的密码悄悄传给它
      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assemblePlayRelease -Pandroid.injected.signing.store.file=my-release-key.jks -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD -Pandroid.injected.signing.key.alias=$KEY_ALIAS -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release # 建议把下载文件的名字也改成 release，方便区分
          path: app/build/outputs/apk/play/release/*.apk # 替换为你实际的 release 路径
